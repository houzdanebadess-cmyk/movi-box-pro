<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOVI BOX PRO - V40 ULTRA PREMIUM</title>
    <link rel="apple-touch-icon" href="./icon.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="MOVI BOX PRO" />
    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/5977/5977590.png"
    />

    <style>
      :root {
        --red: #e50914;
        --black: #050505;
        --dark: #141414;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
      }

      body {
        background: var(--black);
        color: white;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      /* AJOUT FONCTION 1 : MODE AMBIANCE */
      #ambient-glow {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(
          circle at 50% -20%,
          rgba(229, 9, 20, 0.15),
          transparent 80%
        );
        pointer-events: none;
        transition: 1.5s ease;
      }

      /* AJOUT FONCTION 3 : UI PROFILS AVANCÉS */
      #profile-screen {
        position: fixed;
        inset: 0;
        background: #3a0404;
        z-index: 28000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .profile-list {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 50px;
      }
      .p-card {
        width: 140px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
      }
      .p-card:hover {
        transform: scale(1.1);
      }
      .p-avatar {
        width: 120px;
        height: 120px;
        border-radius: 8px;
        margin-bottom: 10px;
        background-size: cover;
        border: 3px solid transparent;
      }
      .p-card:hover .p-avatar {
        border-color: white;
      }
      .add-p-btn {
        width: 120px;
        height: 120px;
        border-radius: 8px;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #888;
      }

      /* --- GLASSMORPHISM & UI --- */
      .glass-panel {
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
      }

      /* --- ANIMATION M --- */
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 30000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .m-logo-anim {
        font-size: 60px;
        font-weight: 900;
        color: var(--red);
        font-family: "Arial Black", sans-serif;
        animation: netflixExplosion 2.5s ease-in-out forwards;
        text-shadow: 0 0 30px rgba(229, 9, 20, 0.8);
      }
      @keyframes netflixExplosion {
        0% {
          transform: scale(1);
          opacity: 0;
          filter: blur(5px);
        }
        30% {
          transform: scale(1.1);
          opacity: 1;
          filter: blur(0px);
        }
        100% {
          transform: scale(80);
          opacity: 0;
          visibility: hidden;
        }
      }

      /* --- NAVIGATION --- */
      .navbar {
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        padding: 15px 4%;
        z-index: 1000;
        transition: background 0.3s;
      }
      .navbar.scrolled {
        background: var(--black);
      }
      .navbar-brand {
        color: var(--red) !important;
        font-weight: 900;
        font-size: 1.8rem;
        letter-spacing: -1px;
      }

      #searchInput {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid transparent;
        color: white;
        border-radius: 25px;
        padding: 8px 18px;
        width: 180px;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(10px);
      }
      #searchInput:focus {
        width: 280px;
        border-color: var(--red);
        background: rgba(255, 255, 255, 0.25);
        outline: none;
      }

      /* --- HERO --- */
      #hero {
        height: 90vh;
        background-size: cover;
        background-position: center 20%;
        position: relative;
        display: flex;
        align-items: center;
        padding: 0 4%;
        transition: background-image 1s ease-in-out;
        background-color: #000;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to right, rgba(0, 0, 0, 0.8) 0%, transparent 60%),
          linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 40%);
      }
      .hero-content {
        position: relative;
        z-index: 10;
        max-width: 700px;
      }
      .hero-content h1 {
        font-size: 4rem;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 20px;
      }
      .hero-badge {
        background: var(--red);
        padding: 5px 12px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 0.8rem;
        margin-bottom: 15px;
        display: inline-block;
      }

      /* --- BANDEAU REPRENDRE --- */
      #resume-banner {
        margin: 20px 4%;
        display: none;
        padding: 20px;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(
          90deg,
          rgba(229, 9, 20, 0.2),
          rgba(0, 0, 0, 0.4)
        );
        border-left: 5px solid var(--red);
        border-radius: 10px;
        animation: slideIn 0.5s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* --- CATALOGUE --- */
      .row-title {
        font-size: 1.4rem;
        font-weight: bold;
        margin: 40px 4% 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .row-title::before {
        content: "";
        width: 4px;
        height: 20px;
        background: var(--red);
        display: inline-block;
      }
      .movie-row {
        display: flex;
        overflow-x: auto;
        gap: 20px;
        padding: 10px 4% 40px;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .movie-row::-webkit-scrollbar {
        display: none;
      }

      /* --- NETFLIX HOVER EFFECT V2 --- */
      .movie-card {
        flex: 0 0 auto;
        width: 180px;
        cursor: pointer;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .movie-card img {
        width: 100%;
        height: 270px;
        object-fit: cover;
        border-radius: 12px;
        transition: 0.3s;
      }

      .card-info-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.8) 50%,
          transparent 100%
        );
        padding: 15px 10px 10px;
        opacity: 0;
        transition: 0.3s;
      }
      .movie-card:hover {
        transform: scale(1.15) translateY(-15px);
        z-index: 500;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
      }
      .movie-card:hover .card-info-overlay {
        opacity: 1;
      }
      .movie-card:hover img {
        filter: brightness(0.6);
      }

      /* --- PAGE DE DETAILS --- */
      #details-page {
        position: fixed;
        inset: 0;
        z-index: 12000;
        display: none;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        overflow-y: auto;
        padding: 60px 5%;
      }
      .details-container {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
      }
      .details-poster {
        width: 300px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .details-info {
        flex: 1;
        min-width: 300px;
      }
      .details-info h2 {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 10px;
      }
      .details-meta {
        display: flex;
        gap: 20px;
        color: #aaa;
        margin-bottom: 25px;
        align-items: center;
      }
      .rating {
        color: #ffc107;
        font-weight: bold;
        font-size: 1.2rem;
      }
      .overview {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #ddd;
        margin-bottom: 30px;
      }

      /* --- PLAYER --- */
      #player-ui {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 20000;
        display: none;
        transition: 0.5s;
      }

      /* MINI LECTEUR STYLE DÉPLAÇABLE */
      #player-ui.mini-player {
        top: auto;
        left: auto;
        right: 20px;
        bottom: 20px;
        width: 350px;
        height: 200px;
        border-radius: 15px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        border: 2px solid var(--red);
        cursor: move;
        touch-action: none;
      }
      #player-ui.mini-player .player-footer,
      #player-ui.mini-player .close-btn {
        display: none;
      }

      #video-mount {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #video-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .close-btn {
        position: absolute;
        top: 25px;
        left: 25px;
        z-index: 21000;
        width: 50px;
        height: 50px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        color: white;
        transition: 0.3s;
      }
      .close-btn:hover {
        background: var(--red);
        transform: rotate(90deg);
      }

      .mini-btn {
        position: absolute;
        top: 25px;
        right: 25px;
        z-index: 21000;
        width: 50px;
        height: 50px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        color: white;
      }

      .player-footer {
        position: absolute;
        bottom: 0;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        z-index: 21000;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        padding: 25px;
        border-top: 1px solid var(--glass-border);
      }

      /* --- AUTH --- */
      #auth-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 25000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-box {
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        padding: 50px;
        border-radius: 30px;
        width: 100%;
        max-width: 450px;
        text-align: center;
      }
      .auth-box h2 {
        font-weight: 900;
        letter-spacing: -1px;
        margin-bottom: 30px;
      }

      .btn-premium {
        background: var(--red);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .btn-premium:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
      }

      .audio-ctrl-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        padding: 8px 20px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      @media (max-width: 768px) {
        .hero-content h1 {
          font-size: 2.5rem;
        }
        .details-poster {
          width: 100%;
          max-width: 250px;
          margin: 0 auto;
        }
        .details-info h2 {
          font-size: 2rem;
          text-align: center;
        }
        .details-meta {
          justify-content: center;
        }
        .movie-card {
          width: 140px;
        }
        .movie-card img {
          height: 210px;
        }
        #player-ui.mini-player {
          width: 200px;
          height: 120px;
        }
      }
      .del-profile {
        position: absolute;
        top: -10px;
        right: 5px;
        background: #e50914;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        border: 2px solid #000;
        cursor: pointer;
        z-index: 100;
        transition: 0.3s;
      }
      .del-profile:hover {
        transform: scale(1.2);
        background: #ff0000;
      }
      /* --- OPTIMISATION RESPONSIVE COMPLETE --- */

      @media (max-width: 768px) {
        /* 1. Correction de l'écran "Qui regarde" */
        #profile-screen h1 {
          font-size: 1.8rem !important;
          margin-bottom: 30px !important;
        }

        .profile-list {
          gap: 15px !important;
          padding: 0 10px;
          justify-content: center;
        }

        /* On force les profils et le bouton ajouter à avoir la même taille */
        .p-card {
          width: 100px !important;
        }

        .p-avatar,
        .add-p-btn {
          width: 90px !important;
          height: 90px !important;
          font-size: 30px !important; /* Taille du '+' réduit */
        }

        /* 2. Correction du Header (Hero) */
        #hero {
          height: 60vh !important;
          background-position: center top !important;
        }
        .hero-content h1 {
          font-size: 2rem !important;
        }
        .hero-content p {
          display: none !important;
        } /* Cache le résumé trop long sur tel */
        .hero-badge {
          font-size: 0.6rem !important;
        }

        /* 3. Ajustement du Catalogue (Films) */
        .row-title {
          font-size: 1.1rem !important;
          margin: 25px 4% 10px !important;
        }
        .movie-row {
          gap: 12px !important;
          padding-bottom: 20px !important;
        }

        .movie-card {
          width: 115px !important;
        }
        .movie-card img {
          height: 170px !important;
        }

        /* Cache les infos complexes en survol sur mobile pour éviter les bugs tactiles */
        .card-info-overlay {
          padding: 8px 5px !important;
        }
        .movie-card:hover {
          transform: scale(1.05) !important;
        }

        /* 4. Page de Détails mobile */
        .details-container {
          gap: 20px !important;
          padding-top: 20px;
        }
        .details-poster {
          width: 160px !important;
          margin: 0 auto;
          display: block;
        }
        .details-info h2 {
          font-size: 1.8rem !important;
          text-align: center;
        }
        .details-meta {
          justify-content: center;
          font-size: 0.9rem;
        }
        .overview {
          font-size: 0.95rem !important;
          text-align: justify;
        }

        /* 5. Lecteur Vidéo Mobile */
        #player-ui.mini-player {
          width: 100% !important;
          height: 220px !important;
          right: 0 !important;
          bottom: 0 !important;
          left: 0 !important;
          border-radius: 0 !important;
        }

        /* On cache les contrôles secondaires sur petit écran pour y voir clair */
        .player-footer {
          padding: 10px !important;
          gap: 8px !important;
        }
        .audio-ctrl-box {
          display: none !important;
        } /* Trop gros pour mobile */
      }

      /* Tablette (Optionnel pour l'équilibre) */
      @media (min-width: 769px) and (max-width: 1100px) {
        .movie-card {
          width: 150px !important;
        }
        .movie-card img {
          height: 225px !important;
        }
      }
      @media (max-width: 768px) {
        /* Rendre l'écran de profil prioritaire et visible */
        #profile-screen {
          padding: 20px !important;
          background: #000 !important; /* Fond noir pur pour mobile */
          display: flex; /* S'assure qu'il s'affiche */
          z-index: 40000 !important; /* Passe au dessus de tout */
        }

        .profile-list {
          gap: 15px !important;
        }
        .p-card {
          width: 100px !important;
        }
        .p-avatar,
        .add-p-btn {
          width: 90px !important;
          height: 90px !important;
        }

        /* Ajuster le bandeau "One Piece" pour qu'il ne remplisse pas l'écran */
        #hero {
          height: 70vh !important;
        }
        .hero-content {
          width: 90% !important;
          padding-bottom: 20px;
        }
        .hero-content h1 {
          font-size: 2.2rem !important;
        }

        /* Aligner les boutons VOIR et LISTE sur une seule ligne */
        .hero-content .d-flex {
          gap: 10px !important;
        }
        .hero-content button {
          padding: 10px 15px !important;
          font-size: 0.8rem !important;
          flex: 1; /* Les deux boutons auront la même taille côte à côte */
        }

        /* Catalogue de films plus compact */
        .movie-card {
          width: 110px !important;
        }
        .movie-card img {
          height: 165px !important;
        }
        .row-title {
          font-size: 1.1rem !important;
          margin: 20px 4% 10px !important;
        }

        /* Barre de recherche plus petite */
        #searchInput {
          width: 120px !important;
          font-size: 0.8rem;
        }
        #searchInput:focus {
          width: 160px !important;
        }
      }
      /* --- BLOC RESPONSIVE UNIQUE (Supprime les autres @media) --- */
      @media (max-width: 768px) {
        /* 1. Écran de sélection de profil (Priorité haute) */
        #profile-screen {
          padding: 20px !important;
          background: #000 !important;
          z-index: 40000 !important;
          justify-content: center !important;
        }
        #profile-screen h1 {
          font-size: 1.8rem !important;
          margin-bottom: 30px !important;
        }
        .profile-list {
          gap: 15px !important;
          justify-content: center !important;
        }
        .p-card {
          width: 100px !important;
        }
        .p-avatar,
        .add-p-btn {
          width: 90px !important;
          height: 90px !important;
        }

        /* 2. Header et Recherche */
        .navbar {
          padding: 10px 4% !important;
        }
        .navbar-brand {
          font-size: 1.2rem !important;
        }
        #searchInput {
          width: 100px !important;
          font-size: 0.8rem;
        }
        #searchInput:focus {
          width: 140px !important;
        }

        /* 3. Hero (Le bandeau One Piece) */
        #hero {
          height: 65vh !important;
          background-position: center top !important;
        }
        .hero-content {
          width: 100% !important;
          bottom: 20px;
        }
        .hero-content h1 {
          font-size: 2rem !important;
          text-align: left;
        }
        .hero-content p {
          display: none !important;
        } /* On cache la description sur tel */

        /* Boutons côte à côte */
        .hero-content .d-flex {
          flex-direction: row !important;
          gap: 10px !important;
          justify-content: flex-start !important;
        }
        .hero-content button {
          flex: 1 !important;
          padding: 10px 5px !important;
          font-size: 0.75rem !important;
          white-space: nowrap;
        }

        /* 4. Catalogue de films */
        .row-title {
          font-size: 1.1rem !important;
          margin: 25px 4% 10px !important;
        }
        .movie-card {
          width: 110px !important;
        }
        .movie-card img {
          height: 165px !important;
        }

        /* 5. Page de Détails */
        .details-container {
          padding-top: 10px !important;
          gap: 15px !important;
        }
        .details-poster {
          width: 150px !important;
        }
        .details-info h2 {
          font-size: 1.8rem !important;
        }

        /* 6. Lecteur Vidéo */
        #player-ui.mini-player {
          width: 100% !important;
          height: 220px !important;
          right: 0 !important;
          bottom: 0 !important;
          left: 0 !important;
          border-radius: 0 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="ambient-glow"></div>
    <div id="splash-screen"><span class="m-logo-anim">M</span></div>

    <div id="profile-screen">
      <h1 class="mb-5 fw-bold" style="font-size: 2.5rem">Qui regarde ?</h1>
      <div class="profile-list" id="p-list-container"></div>
      <div
        id="add-profile-form"
        style="display: none"
        class="glass-panel p-4 text-center"
      >
        <input
          type="text"
          id="new-p-name"
          class="form-control bg-dark text-white border-0 mb-3"
          placeholder="Nom du profil"
        />
        <div class="d-flex gap-2 mb-3">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
            class="p-avatar-select"
            onclick="setTempAvatar(this.src)"
            style="width: 50px; cursor: pointer; border: 2px solid white"
          />
          <img
            src="https://mir-s3-cdn-cf.behance.net/project_modules/disp/84c20033850498.56ba69ac290ea.png"
            class="p-avatar-select"

      <div id="resume-banner" class="glass-panel">

      <div id="search-area" style="display: none; padding-top: 100px">

          <button class="btn btn-dark px-3" onclick="setS(2)">S2</button>
          <button class="btn btn-warning px-3 fw-bold" onclick="setS(3)">
            S3 HD

          <button class="btn btn-primary px-3 fw-bold" onclick="setS(4)">

        <div class="audio-ctrl-box">

            <input
              type="range"
              id="boostRange"

              oninput="applyAudioBoost()"

          <div class="d-flex align-items-center gap-2 border-start ps-3">
            <select

              onchange="updateVid()"
              style="
                background: none;

                border: none;
                font-weight: bold;
                cursor: pointer;
              "
            >
              <option value="fr" style="background: #000">VF (FR)</option>
              <option value="en" style="background: #000">VO (EN)</option>
            </select>

              class="btn btn-sm btn-danger rounded-circle"
              onclick="updateVid()"
            >
              <i class="fas fa-sync-alt"></i>

          id="ep-ctrl"
          class="d-none text-white d-flex align-items-center gap-2 glass-panel px-3 py-1"

          <input

            onchange="updateVid()"
          />

          <input
            type="number"
            id="e_val"
            value="1"
            min="1"
            style="
              width: 45px;
              background: none;
              color: white;
              border: none;
              text-align: center;
              font-weight: bold;
            "
            onchange="updateVid()"
          />
        </div>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDEdabt4b_cHhxBE3NnbtPDvn8evoLqM6c",
        authDomain: "movi-box-pro.firebaseapp.com",
        projectId: "movi-box-pro",
        storageBucket: "movi-box-pro.firebasestorage.app",
        messagingSenderId: "796887857758",
        appId: "1:796887857758:web:0b2ae896412770a5df52cf",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth(),
        KEY = "dbfa75b6ecba1e10ef406e790b1afc46",
        IMG = "https://image.tmdb.org/t/p/original/";

      let cur = null,
        srv = 1,
        heroList = [],
        heroIdx = 0;
      let audioCtx, source, gainNode;

      // LOGIQUE DE PROFIL ISOLÉE
      let profiles = JSON.parse(localStorage.getItem("movi_profiles_v40")) || [
        {
          id: 1,
          name: "Admin",
          avatar:
            "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png",
          myList: [],
          lastPlayed: null,
        },
      ];
      function delP(e, id) {
        e.stopPropagation();
        if (confirm("Supprimer ce compte ?")) {
          profiles = profiles.filter((p) => p.id !== id);
          localStorage.setItem("movi_profiles_v60", JSON.stringify(profiles));
          showProfileSelection();
        }
      }
      let currentProfile = null;
      let tempAvatar =
        "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";

      const allCats = [
        { n: "Tendances", p: "/trending/all/week" },
        { n: "Séries Netflix", p: "/discover/tv?with_networks=213" },
        { n: "Action", p: "/discover/movie?with_genres=28" },
        {
          n: "Sport & Compétition ⚽",
          p: "/discover/movie?with_genres=10770&with_keywords=6075",
        },
        { n: "Animation Japonaise 🇯🇵", p: "/discover/tv?with_genres=16" },
        { n: "K-Drama 🇰🇷", p: "/discover/tv?with_original_language=ko" },
        { n: "Horreur", p: "/discover/movie?with_genres=27" },
        {
          n: "Films Français 🇫🇷",
          p: "/discover/movie?with_original_language=fr",
        },
        { n: "Science-Fiction", p: "/discover/movie?with_genres=87" },
        { n: "Comédies", p: "/discover/movie?with_genres=35" },
        { n: "Documentaires", p: "/discover/movie?with_genres=99" },
        { n: "Thriller", p: "/discover/movie?with_genres=53" },
        { n: "Romance", p: "/discover/movie?with_genres=10749" },
        { n: "Fantastique", p: "/discover/movie?with_genres=14" },
        { n: "Mystère", p: "/discover/movie?with_genres=9648" },
        { n: "Crime", p: "/discover/movie?with_genres=80" },
        { n: "Famille", p: "/discover/movie?with_genres=10751" },
        { n: "Guerre", p: "/discover/movie?with_genres=10752" },
        { n: "Western", p: "/discover/movie?with_genres=37" },
        { n: "Musique", p: "/discover/movie?with_genres=10402" },
        { n: "Top Classiques", p: "/movie/top_rated" },
      ];

      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("splash-screen").style.display = "none";
        }, 2800);
      });

      window.addEventListener("scroll", () => {
        const nav = document.getElementById("top-nav");
        if (window.scrollY > 50) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
      });

      auth.onAuthStateChanged((user) => {
        if (user) {
          document.getElementById("auth-screen").style.display = "none";
          showProfileSelection();
        }
      });

      function showProfileSelection() {
        document.getElementById("profile-screen").style.display = "flex";
        const container = document.getElementById("p-list-container");
        container.innerHTML = "";
        profiles.forEach((p) => {
          const div = document.createElement("div");
          div.className = "p-card";
          div.innerHTML = `<div class="del-profile" onclick="delP(event, ${p.id})"><i class="fas fa-times"></i></div><div class="p-avatar" style="background-image:url('${p.avatar}')"></div><div class="text-white mt-2 fw-bold">${p.name}</div>`;
          div.onclick = () => selectProfile(p.id);
          container.appendChild(div);
        });
        const addBtn = document.createElement("div");
        addBtn.className = "p-card";
        addBtn.innerHTML = `<div class="add-p-btn"><i class="fas fa-plus"></i></div><div class="mt-2 small">Ajouter</div>`;
        addBtn.onclick = () =>
          (document.getElementById("add-profile-form").style.display = "block");
        container.appendChild(addBtn);
      }

      function selectProfile(id) {
        currentProfile = profiles.find((p) => p.id === id);
        document.getElementById("profile-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        document.getElementById("user-icon").style.backgroundImage =
          `url('${currentProfile.avatar}')`;
        startCatalog();
        updateMyListUI();
        checkResume();
      }

      function setTempAvatar(src) {
        tempAvatar = src;
        document
          .querySelectorAll(".p-avatar-select")
          .forEach((img) => (img.style.borderColor = "transparent"));
        event.target.style.borderColor = "white";
      }

      function saveNewProfile() {
        const name = document.getElementById("new-p-name").value;
        if (!name) return;
        profiles.push({
          id: Date.now(),
          name: name,
          avatar: tempAvatar,
          myList: [],
          lastPlayed: null,
        });
        localStorage.setItem("movi_profiles_v40", JSON.stringify(profiles));
        document.getElementById("add-profile-form").style.display = "none";
        showProfileSelection();
      }

      function connect(isNew) {
        const e = document.getElementById("email").value,
          p = document.getElementById("pass").value;
        if (!e || !p) return alert("Remplissez les champs");
        const task = isNew
          ? auth.createUserWithEmailAndPassword(e, p)
          : auth.signInWithEmailAndPassword(e, p);
        task.catch((err) => alert(err.message));
      }

      async function startCatalog() {
        const root = document.getElementById("catalog-area");
        root.innerHTML = "";
        for (let [idx, c] of allCats.entries()) {
          const r = await fetch(
            `https://api.themoviedb.org/3${c.p}${c.p.includes("?") ? "&" : "?"}api_key=${KEY}&language=fr-FR`,
          );
          const d = await r.json();
          if (idx === 0) {
            heroList = d.results.slice(0, 10);
            updateHero();
            setInterval(nextHero, 8000);
          }
          const box = document.createElement("div");
          box.innerHTML = `<h2 class="row-title">${c.n}</h2>`;
          const row = document.createElement("div");
          row.className = "movie-row";
          d.results.forEach((m) => {
            if (m.poster_path) row.appendChild(mkCard(m));
          });
          box.appendChild(row);
          root.appendChild(box);
        }
      }

      function updateHero() {
        const m = heroList[heroIdx];
        document.getElementById("hero").style.backgroundImage =
          `url(${IMG + m.backdrop_path})`;
        document.getElementById("hero-t").innerText = m.title || m.name;
        document.getElementById("hero-d").innerText = m.overview
          ? m.overview.slice(0, 180) + "..."
          : "";
        document.getElementById("hero-p").onclick = () => showDetails(m);
        document.getElementById("hero-s").onclick = () => saveItem(m);
      }

      function nextHero() {
        heroIdx = (heroIdx + 1) % heroList.length;
        updateHero();
      }

      function mkCard(m) {
        const div = document.createElement("div");
        div.className = "movie-card";
        const year = (m.release_date || m.first_air_date || "---").split(
          "-",
        )[0];
        const note = m.vote_average ? m.vote_average.toFixed(1) : "N/A";
        div.innerHTML = `<img src="${IMG + m.poster_path}" loading="lazy"><div class="card-info-overlay"><div class="fw-bold text-truncate small" style="color:white;">${m.title || m.name}</div><div class="d-flex justify-content-between align-items-center mt-1" style="font-size: 0.65rem;"><span class="text-warning fw-bold"><i class="fas fa-star me-1"></i>${note}</span><span class="text-white-50">${year}</span><span class="badge border border-danger text-danger" style="font-size: 0.5rem; padding: 2px 4px;">4K</span></div></div>`;
        div.onclick = () => showDetails(m);
        return div;
      }

      function showDetails(m) {
        cur = m;
        document.getElementById("det-img").src = IMG + m.poster_path;
        document.getElementById("det-title").innerText = m.title || m.name;
        document.getElementById("det-rating").innerHTML =
          `<i class="fas fa-star me-2"></i>${m.vote_average.toFixed(1)}`;
        document.getElementById("det-date").innerText = (
          m.release_date ||
          m.first_air_date ||
          "N/A"
        ).split("-")[0];
        document.getElementById("det-type").innerText = m.title
          ? "FILM"
          : "SÉRIE";
        document.getElementById("det-desc").innerText =
          m.overview || "Aucun résumé disponible pour ce titre.";
        document.getElementById("det-save").onclick = () => saveItem(m);
        document.getElementById("details-page").style.display = "block";
      }

      function hideDetails() {
        document.getElementById("details-page").style.display = "none";
      }

      function launchVideo() {
        hideDetails();
        currentProfile.lastPlayed = cur;
        localStorage.setItem("movi_profiles_v40", JSON.stringify(profiles));
        srv = 1;
        document.getElementById("ep-ctrl").className = cur.title
          ? "d-none"
          : "text-white d-flex align-items-center gap-2 glass-panel px-3 py-1";
        document.getElementById("player-ui").style.display = "block";
        document.getElementById("player-ui").classList.remove("mini-player");
        updateVid();
      }

      // NOUVEAU : MINI LECTEUR AVEC DRAG AND DROP
      function toggleMiniPlayer() {
        const player = document.getElementById("player-ui");
        player.classList.toggle("mini-player");
        if (player.classList.contains("mini-player")) {
          initDrag(player);
        }
      }

      function initDrag(el) {
        let pos1 = 0,
          pos2 = 0,
          pos3 = 0,
          pos4 = 0;
        el.onmousedown = dragMouseDown;
        el.ontouchstart = dragMouseDown;

        function dragMouseDown(e) {
          if (!el.classList.contains("mini-player")) return;
          e.preventDefault();
          pos3 = e.clientX || e.touches[0].clientX;
          pos4 = e.clientY || e.touches[0].clientY;
          document.onmouseup = closeDrag;
          document.ontouchend = closeDrag;
          document.onmousemove = elementDrag;
          document.ontouchmove = elementDrag;
        }

        function elementDrag(e) {
          pos1 = pos3 - (e.clientX || e.touches[0].clientX);
          pos2 = pos4 - (e.clientY || e.touches[0].clientY);
          pos3 = e.clientX || e.touches[0].clientX;
          pos4 = e.clientY || e.touches[0].clientY;
          el.style.top = el.offsetTop - pos2 + "px";
          el.style.left = el.offsetLeft - pos1 + "px";
          el.style.bottom = "auto";
          el.style.right = "auto";
        }

        function closeDrag() {
          document.onmouseup = null;
          document.onmousemove = null;
        }
      }

      function checkResume() {
        const last = currentProfile.lastPlayed;
        if (last) {
          document.getElementById("resume-banner").style.display = "flex";
          document.getElementById("resume-title").innerText =
            last.title || last.name;
          document.getElementById("resume-thumb").style.backgroundImage =
            `url(${IMG + last.poster_path})`;
        } else {
          document.getElementById("resume-banner").style.display = "none";
        }
      }

      function playLast() {
        cur = currentProfile.lastPlayed;
        launchVideo();
      }

      function saveItem(m) {
        if (!currentProfile.myList.find((x) => x.id === m.id)) {
          currentProfile.myList.push(m);
          localStorage.setItem("movi_profiles_v40", JSON.stringify(profiles));
          updateMyListUI();
          alert("Ajouté à votre liste !");
        }
      }

      function updateMyListUI() {
        const area = document.getElementById("my-list-area"),
          row = document.getElementById("my-list-row");
        if (!currentProfile || currentProfile.myList.length === 0) {
          area.style.display = "none";
          return;
        }
        area.style.display = "block";
        row.innerHTML = "";
        currentProfile.myList.forEach((m) => row.appendChild(mkCard(m)));
      }

      function setS(n) {
        srv = n;
        updateVid();
      }

      function updateVid() {
        const t = cur.title ? "movie" : "tv",
          s = document.getElementById("s_val").value,
          e = document.getElementById("e_val").value;
        const l = document.getElementById("langSelect").value;
        let url = "";
        if (srv === 1)
          url = `https://vidsrc.to/embed/${t}/${cur.id}${t === "tv" ? "/" + s + "/" + e : ""}?lang=${l}`;
        if (srv === 2)
          url = `https://vidsrc.me/embed/${t}?tmdb=${cur.id}${t === "tv" ? "&sea=" + s + "&epi=" + e : ""}&lang=${l}`;
        if (srv === 3)
          url = `https://moviesapi.club/${t}/${cur.id}${t === "tv" ? "-" + s + "-" + e : ""}`;
        if (srv === 4)
          url = `https://player.autoembed.cc/embed/${t}/${cur.id}${t === "tv" ? "/" + s + "/" + e : ""}`;
        if (srv === 5)
          url = `https://vidsrc.xyz/embed/${t}/${cur.id}${t === "tv" ? "/" + s + "/" + e : ""}`;
        document.getElementById("video-mount").innerHTML =
          `<iframe id="video-frame" src="${url}" allowfullscreen allow="autoplay"></iframe>`;
      }

      function applyAudioBoost() {
        try {
          const boostVal = document.getElementById("boostRange").value;
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
          }
          gainNode.gain.value = boostVal;
        } catch (e) {
          console.log("Boost audio pret.");
        }
      }

      function stopPlayer() {
        document.getElementById("player-ui").style.display = "none";
        document.getElementById("video-mount").innerHTML = "";
        checkResume();
      }

      async function doSearch(q) {
        const area = document.getElementById("search-area"),
          row = document.getElementById("search-row");
        if (q.length < 2) {
          area.style.display = "none";
          return;
        }
        const r = await fetch(
          `https://api.themoviedb.org/3/search/multi?api_key=${KEY}&language=fr-FR&query=${q}`,
        );
        const d = await r.json();
        row.innerHTML = "";
        area.style.display = "block";
        d.results.forEach((m) => {
          if (m.poster_path) row.appendChild(mkCard(m));
        });
      }
    </script>
  </body>
</html>
